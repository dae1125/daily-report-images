name: 大鳄日报系统
on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:
jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: config
        run: |
          cat > config.json << 'EOF'
          {"output_dir":"${{ github.workspace }}/output","deepseek":{"base_url":"https://api.deepseek.com/v1","api_key":"${{ secrets.DEEPSEEK_API_KEY }}","model":"deepseek-chat"},"feishu":{"webhook_url":"${{ secrets.FEISHU_WEBHOOK }}","app_id":"${{ secrets.FEISHU_APP_ID }}","app_secret":"${{ secrets.FEISHU_APP_SECRET }}"}}
          EOF
      - run: node 工作狂005.js && node 工作狂009.js && node 工作狂006.js && node 工作狂007.jsname: 大鳄日报系统
